# HyperVault Manager — central panel for HyperVBackupAgent.
#
# Build & run:
#   docker compose up -d --build
#
# Web UI:  http://localhost:8088
#
services:
  manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: hypervault/manager:latest
    container_name: hypervault-manager
    restart: unless-stopped
    ports:
      # Host 8096 -> container 8080 (ASPNETCORE_URLS).
      # 8096 avoids colliding with other services on this host; change the left side freely.
      - "8096:8080"
    environment:
      # SQLite database lives on the mounted volume below.
      TZ: ${TZ:-UTC}
      # Override manager tuning if needed:
      Manager__DataPath: /data
      Manager__HealthCheckIntervalSeconds: ${HEALTH_INTERVAL:-60}
    volumes:
      # Persistent SQLite database + any local state.
      - manager-data:/data
    # The manager reaches each Hyper-V host over the host network; use
    # `network_mode: host` on Linux if your agents only bind to localhost.
    networks:
      - default

volumes:
  manager-data:
    driver: local
